<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>「MyProfile」</title>
  <meta name="description" content="「MyProfile」">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-in">
      <h1 class="logo">MyProfile</h1>
      <nav id="header-nav">
        <a href="#about-content">About</a>
        <a href="#works-content">Works</a>
      </nav>
    </div>
  </header>
<main>
<article>
        <section class="main-image">
   <img src="image/8ff30074c63ab4df2297b2343da2412c0e716f12.png" alt="カメラの画像"/>
        </section>
        <section id="about-content">
          <h2 class="section-title">About</h2>
          <div class="about-flex-container">
          <div class="profile-photo">
          <img src="image/62b9a940394f4742e1fd4d08b8ce6fc59643c9c9.png" alt="自己紹介の画像"/>
          </div>
        <div class="profile-text">
        <h3>Kazuki Asahina</h3>
        <ul>
          <li>25歳 長野県佐久市出身</li>
          <li>ソフトウェア業界でマーケティングに従事</li>
          <li>趣味はカメラ、愛機はCanon</li>
          <li>自然を撮影するのが好きで、海や山によく行く</li>
          </ul>
         </div>
          </div>
         </section>
          <section id="works-content">
            <h2 class="section-title">Works</h2>
            <div class="works-flex-container">
             <div class="work-photo">
            <img src="image/b570b968ccf2b37acc5c86235b964b962d939970.png" alt="海の画像">
            <p>新潟に訪れた際に、日本海の雄大さに魅了されて撮影した１枚</p>
            </div> 

            <div class="work-photo">
            <img src="image/fef9028669194307740cc82fafe86ee8141b1239.png" alt="山の画像">
            <p>地元長野の木曽町から撮影した、冠雪した御嶽山</p>
          </div> 

            <div class="work-photo">
            <img src="image/8e03e51e11def9fec714c81f810e8e8b0137c35e.png" alt="街の画像">
            <p>京都で撮影した、明け方の古き良き日本の街並み</p>
          </div> 
          
          </div>
          </section>
       </article>
    </main>
    <footer>
      <p>&copy; MyProfile. All rights reserved.</p>
    </footer>
  </body>
</html>
